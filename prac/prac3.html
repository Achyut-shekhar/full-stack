<!doctype html>
<html>
  <head> </head>

  <body>
    <h2>Count Vowels in a String</h2>

    <input type="text" id="text" placeholder="Enter a string" />
    <br /><br />

    <button onclick="countVowels()">Count Vowels</button>

    <p id="result"></p>

    <script>
      function countVowels() {
        let str = document.getElementById("text").value.toLowerCase();
        let count = 0;

        for (let i = 0; i < str.length; i++) {
          if (
            str[i] == "a" ||
            str[i] == "e" ||
            str[i] == "i" ||
            str[i] == "o" ||
            str[i] == "u"
          ) {
            count++;
          }
        }

        document.getElementById("result").innerHTML =
          "Number of vowels: " + count;
      }
    </script>
  </body>
</html>
